<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Chat</title>
    <style>
        /* --- Clean, Human-Readable Styling --- */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background-color: #f4f4f9; }
        #chat-window { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 20px; background-color: #e5e5ea; width: fit-content; max-width: 80%; }
        #input-area { display: flex; padding: 15px; background: #fff; border-top: 1px solid #ddd; }
        #message-input { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        #send-btn { background-color: #007bff; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #send-btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <div id="chat-window"></div>

    <form id="input-area" action="">
        <input id="message-input" autocomplete="off" placeholder="Type your message here..." />
        <button id="send-btn">Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    
    <script>
        // --- Client-Side Logic ---
        
        // 1. Connect to the server
        const socket = io();

        // 2. Grab the HTML elements we need to interact with
        const form = document.getElementById('input-area');
        const input = document.getElementById('message-input');
        const chatWindow = document.getElementById('chat-window');

        // 3. Handle sending a message
        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent the page from refreshing when submitting
            
            if (input.value) {
                // Send the message text to the server under the label 'chat message'
                socket.emit('chat message', input.value);
                input.value = ''; // Clear the input box
            }
        });

        // 4. Handle receiving a message from the server
        socket.on('chat message', function(msg) {
            // Create a new visual message bubble
            const messageBubble = document.createElement('div');
            messageBubble.textContent = msg;
            messageBubble.classList.add('message');
            
            // Add it to the chat window and scroll to the bottom
            chatWindow.appendChild(messageBubble);
            window.scrollTo(0, document.body.scrollHeight);
        });
    </script>
</body>
</html>
